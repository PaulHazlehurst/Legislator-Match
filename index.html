<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Legislator Bill Matcher</title>
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1C1C1A;
    --text-secondary: #6B6A66;
    --text-tertiary: #9C9A95;
    --accent: #0F6E56;
    --accent-light: #E1F5EE;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18191A;
      --surface: #232425;
      --border: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.22);
      --text: #EDEDEC;
      --text-secondary: #A8A7A3;
      --text-tertiary: #777670;
      --accent: #5DCAA5;
      --accent-light: #04342C;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  header {
    margin-bottom: 2rem;
  }
  header h1 {
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  header p {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0;
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.75rem;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  select {
    width: 100%;
    height: 38px;
    padding: 0 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    appearance: none;
  }
  select:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .results-meta {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .results {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-top .name {
    font-weight: 500;
    font-size: 15px;
    margin: 0;
  }
  .card-top .meta {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 2px 0 0;
  }
  .score-box {
    text-align: right;
    flex-shrink: 0;
  }
  .score-box .label {
    font-size: 11px;
    color: var(--text-tertiary);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .score-box .value {
    font-size: 24px;
    font-weight: 500;
    margin: 0;
    color: var(--accent);
  }
  .meter {
    height: 6px;
    background: var(--accent-light);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .meter-fill {
    height: 100%;
    background: var(--accent);
  }
  .stats-row {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .stats-row span {
    display: inline-flex;
    align-items: center;
  }
  details {
    border-top: 0.5px solid var(--border);
    padding-top: 8px;
  }
  details summary {
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .bill-list {
    list-style: none;
    margin: 8px 0 0;
    padding: 0;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .bill-list li {
    padding: 4px 0;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 0.5px solid var(--border);
  }
  .bill-list li:last-child { border-bottom: none; }
  .tag {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 500;
    white-space: nowrap;
  }
  .tag-passed { background: var(--accent-light); color: var(--accent); }
  .tag-failed { background: rgba(0,0,0,0.06); color: var(--text-secondary); }
  @media (prefers-color-scheme: dark) {
    .tag-failed { background: rgba(255,255,255,0.08); }
  }
  .empty {
    font-size: 14px;
    color: var(--text-secondary);
    padding: 1rem 0;
  }
  footer {
    margin-top: 2.5rem;
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Legislator bill matcher</h1>
    <p>Find legislators with a track record on your issue, ranked by interest and passage rate.</p>
  </header>

  <div class="controls">
    <div class="field">
      <label for="state">State</label>
      <select id="state"></select>
    </div>
    <div class="field">
      <label for="issue">Issue area</label>
      <select id="issue"></select>
    </div>
    <div class="field">
    <label for="subset">Subset</label>
    <select id="subset">
        <option value="any">All subsets</option>
      </select>
    </div>
    <div class="field">
      <label for="party">Party</label>
      <select id="party">
        <option value="any">Any party</option>
        <option value="D">Democrat</option>
        <option value="R">Republican</option>
      </select>
    </div>
    <div class="field">
      <label for="chamber">Chamber</label>
      <select id="chamber">
        <option value="any">Both chambers</option>
        <option value="senate">Senate</option>
        <option value="house">House / Delegates</option>
      </select>
    </div>
  </div>

  <div class="results-meta" id="results-meta"></div>
  <div class="results" id="results"></div>

  <footer>
    Data is loaded from <code>data.json</code>. Edit that file to add legislators, bills, or new states.
  </footer>
</div>

<script>
let DATA = null;

async function init() {
  try {
    const res = await fetch('data.json');
    DATA = await res.json();
  } catch (err) {
    document.getElementById('results').innerHTML =
      '<p class="empty">Could not load data.json. Make sure it is in the same folder as this page.</p>';
    return;
  }

  const stateSel = document.getElementById('state');
  Object.entries(DATA.states).forEach(([code, st]) => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = st.name;
    stateSel.appendChild(opt);
  });

  const issueSel = document.getElementById('issue');
  Object.entries(DATA.topics).forEach(([code, label]) => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = label;
    issueSel.appendChild(opt);
  });

  const subsetSel = document.getElementById('subset');

function populateSubsets() {
  const selectedIssue = issueSel.value;

  subsetSel.innerHTML =
    '<option value="any">All subsets</option>';

  const subsets = new Set();

  Object.values(DATA.states).forEach(state => {
    state.legislators.forEach(leg => {
      leg.bills.forEach(bill => {
        if (
          bill.topic === selectedIssue &&
          bill.subtopic
        ) {
          subsets.add(bill.subtopic);
        }
      });
    });
  });

  [...subsets].sort().forEach(subtopic => {
    const opt = document.createElement('option');
    opt.value = subtopic;
    opt.textContent = subtopic;
    subsetSel.appendChild(opt);
  });
}

  ['state', 'party', 'chamber', 'subset']
  .forEach(id => {
    document
      .getElementById(id)
      .addEventListener('change', render);
  });

issueSel.addEventListener('change', () => {
  populateSubsets();
  render();
});

// Passion score: weighted count of bills on this topic, favoring
// sponsorships over co-sponsorships and recent years over older ones.
function computeScore(bills, issue) {
  const relevant = bills.filter(b => b.topic === issue);
  if (relevant.length === 0) return { score: 0, relevant, passed: 0, rate: 0 };

  const currentYear = new Date().getFullYear();
  let raw = 0;
  let maxPossiblePerBill = 0;

  relevant.forEach(b => {
    const roleWeight = b.role === 'sponsor' ? 1 : 0.5;
    const age = Math.max(0, currentYear - b.year);
    const recencyWeight = Math.max(0.3, 1 - age * 0.15);
    raw += roleWeight * recencyWeight;
    maxPossiblePerBill += 1; // sponsor, this year, would score 1
  });

  // Normalize: scale so that a handful of recent sponsorships approaches 100
  const score = Math.min(100, Math.round((raw / 4) * 100));

  const passed = relevant.filter(b => b.outcome === 'passed').length;
  const rate = Math.round((passed / relevant.length) * 100);

  return { score, relevant, passed, rate };
}

function render() {
  const state = document.getElementById('state').value;
  const issue = document.getElementById('issue').value;
  const subset = document.getElementById('subset').value;
  const party = document.getElementById('party').value;
  const chamber = document.getElementById('chamber').value;

  const stateData = DATA.states[state];
  let legislators = stateData ? stateData.legislators : [];

  if (party !== 'any') legislators = legislators.filter(l => l.party === party);
  if (chamber !== 'any') legislators = legislators.filter(l => l.chamber === chamber);

  const scored = legislators
    .map(l => {
  const filteredBills =
    subset === 'any'
      ? l.bills
      : l.bills.filter(
          b => b.subtopic === subset
        );

  return {
    l,
    ...computeScore(filteredBills, issue)
  };
})
    .filter(item => item.relevant.length > 0)
    .sort((a, b) => b.score - a.score);

  const meta = document.getElementById('results-meta');
  const results = document.getElementById('results');

  if (scored.length === 0) {
    meta.textContent = '';
    results.innerHTML = '<p class="empty">No legislators with a record on this issue match these filters.</p>';
    return;
  }

  meta.textContent = `${scored.length} legislator${scored.length === 1 ? '' : 's'} with a track record on ${DATA.topics[issue].toLowerCase()}`;

  results.innerHTML = scored.map(item => {
    const { l, score, relevant, passed, rate } = item;
    const partyLabel = l.party === 'D' ? 'Democrat' : 'Republican';
    const chamberLabel = l.chamber === 'senate' ? 'Senate' : 'House';
    const districtLabel = l.district ? `District ${l.district}` : '';

    const billsHtml = [...relevant]
      .sort((a, b) => b.year - a.year)
      .map(b => {
        const roleLabel = b.role === 'sponsor' ? 'Sponsor' : 'Co-sponsor';
        const tagClass = b.outcome === 'passed' ? 'tag-passed' : 'tag-failed';
        const tagLabel = b.outcome === 'passed' ? 'Passed' : 'Did not pass';
        return `<li>
          <span>${escapeHtml(b.title)} <span style="color:var(--text-tertiary);">&middot; ${roleLabel}, ${b.year}</span></span>
          <span class="tag ${tagClass}">${tagLabel}</span>
        </li>`;
      }).join('');

    return `
    <div class="card">
      <div class="card-top">
        <div>
          <p class="name">${escapeHtml(l.name)}</p>
          <p class="meta">${partyLabel} &middot; ${chamberLabel}${districtLabel ? ' &middot; ' + districtLabel : ''}</p>
        </div>
        <div class="score-box">
          <p class="label">Interest score</p>
          <p class="value">${score}</p>
        </div>
      </div>
      <div class="meter"><div class="meter-fill" style="width:${score}%;"></div></div>
      <div class="stats-row">
        <span>${relevant.length} bill${relevant.length === 1 ? '' : 's'} on this issue</span>
        <span>${passed} of ${relevant.length} passed (${rate}%)</span>
      </div>
      <details>
        <summary>Show bill history</summary>
        <ul class="bill-list">${billsHtml}</ul>
      </details>
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
</body>
</html>
